  .label{display:block;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
  .input,.select{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:14px;background:var(--bg-surface);color:var(--text-primary);outline:none;transition:all .15s;}
  .input:focus,.select:focus{border-color:transparent;box-shadow:0 0 0 2px var(--accent);}
  .btn-primary{background:var(--accent);color:#fff;font-weight:500;padding:8px 16px;border-radius:8px;font-size:14px;cursor:pointer;border:0;transition:background .15s;}
  .btn-primary:hover{background:var(--accent-hover);}
  .btn-secondary{background:var(--bg-surface);color:var(--text-secondary);font-weight:500;padding:8px 16px;border-radius:8px;border:1px solid var(--border);font-size:14px;cursor:pointer;}
  .btn-secondary:hover{background:var(--bg-hover);}
  .btn-ghost{color:var(--text-secondary);font-weight:500;padding:8px 12px;border-radius:8px;background:transparent;border:0;font-size:14px;cursor:pointer;}
  .btn-ghost:hover{background:var(--bg-hover);}
  .icon{width:1em;height:1em;display:inline-block;vertical-align:-.125em;}

  html[data-theme="dark"] .bg-white{background-color:var(--bg-surface)!important;}
  html[data-theme="dark"] .bg-slate-50{background-color:var(--bg-muted)!important;}
  html[data-theme="dark"] .bg-slate-100{background-color:var(--bg-hover)!important;}
  html[data-theme="dark"] .hover\:bg-slate-50:hover{background-color:var(--bg-hover)!important;}
  html[data-theme="dark"] .hover\:bg-slate-100:hover{background-color:var(--bg-hover)!important;}
  html[data-theme="dark"] .border-slate-200{border-color:var(--border)!important;}
  html[data-theme="dark"] .border-slate-100{border-color:var(--border)!important;}
  html[data-theme="dark"] .divide-slate-200 > *+*{border-color:var(--border)!important;}
  html[data-theme="dark"] .divide-slate-100 > *+*{border-color:var(--border)!important;}
  html[data-theme="dark"] .text-slate-900{color:var(--text-primary)!important;}
  html[data-theme="dark"] .text-slate-800{color:var(--text-primary)!important;}
  html[data-theme="dark"] .text-slate-700{color:var(--text-secondary)!important;}
  html[data-theme="dark"] .text-slate-600{color:var(--text-secondary)!important;}
  html[data-theme="dark"] .text-slate-500{color:var(--text-muted)!important;}
  html[data-theme="dark"] .text-slate-400{color:var(--text-faint)!important;}
  html[data-theme="dark"] .text-slate-300{color:var(--text-faint)!important;}

  html[data-theme="dark"] input::placeholder,html[data-theme="dark"] textarea::placeholder{color:var(--text-faint);}

  .theme-toggle{position:relative;width:52px;height:28px;border-radius:999px;background:var(--bg-hover);border:1px solid var(--border);cursor:pointer;transition:background .2s;padding:0;display:inline-flex;align-items:center;}
  .theme-toggle:hover{background:var(--border);}

  html[data-theme="dark"] .theme-toggle .knob{transform:translateX(24px);}
</style>

function KpiCard({ label, value, sub, icon:IconC, cor }) {
  const cores = {
    blue:{bg:'#e6f1f5',fg:'#1f7a95'}, green:{bg:'#f0fdf4',fg:'#16a34a'},
    orange:{bg:'#fff7ed',fg:'#ea580c'}, purple:{bg:'#faf5ff',fg:'#9333ea'},
    teal:{bg:'#f0fdfa',fg:'#0d9488'}, red:{bg:'#fef2f2',fg:'#dc2626'},
  };
  const c = cores[cor] || cores.blue;
  return (
    <div className="card p-5 flex items-start gap-4">
      <div className="w-11 h-11 rounded-xl flex items-center justify-center flex-shrink-0" style={{background:c.bg,color:c.fg}}>
        <IconC size={20}/>
      </div>
      <div className="min-w-0">
        <p className="text-xs text-slate-500 font-medium uppercase tracking-wide">{label}</p>
        <p className="text-2xl font-bold text-slate-900 mt-0.5">{value}</p>
        {sub && <p className="text-xs text-slate-400 mt-0.5">{sub}</p>}
      </div>
    </div>
  );
}
function BarraStatus({ label, count, total, cor }) {
  const pct = total > 0 ? Math.round((count/total)*100) : 0;
  const cores = { yellow:'#facc15', blue:'#1f7a95', green:'#22c55e', red:'#f87171', purple:'#c084fc', slate:'#cbd5e1', orange:'#fb923c', teal:'#2dd4bf', indigo:'#818cf8' };
  return (
    <div className="flex items-center gap-3">
      <span className="text-xs text-slate-500 w-44 truncate">{label}</span>
      <div className="flex-1 bg-slate-100 rounded-full h-2 overflow-hidden">
        <div style={{width:`${pct}%`,background:cores[cor]||'#3b82f6',height:'100%',borderRadius:9999,transition:'width .5s'}}/>
      </div>
      <span className="text-xs font-semibold text-slate-700 w-8 text-right">{count}</span>
    </div>
  );
}

function Dashboard() {
  const [mesFiltro, setMesFiltro] = useState(() => localStorage.getItem('isocs_dash_mes') || 'ABRIL');
  const [repFiltro, setRepFiltro] = useState(() => localStorage.getItem('isocs_dash_rep') || 'TODAS');
  useEffect(() => { localStorage.setItem('isocs_dash_mes', mesFiltro); }, [mesFiltro]);
  useEffect(() => { localStorage.setItem('isocs_dash_rep', repFiltro); }, [repFiltro]);

  const MESES_DISPONIVEIS = ['TODOS','JANEIRO','FEVEREIRO','MARÇO','ABRIL','MAIO','JUNHO','JULHO','AGOSTO','SETEMBRO','OUTUBRO','NOVEMBRO','DEZEMBRO'];
  const MES_ABREV = { JANEIRO:'JAN', FEVEREIRO:'FEV', MARÇO:'MAR', ABRIL:'ABR', MAIO:'MAI', JUNHO:'JUN', JULHO:'JUL', AGOSTO:'AGO', SETEMBRO:'SET', OUTUBRO:'OUT', NOVEMBRO:'NOV', DEZEMBRO:'DEZ' };
  const REPARTICOES = ['TODAS','NEXFRAME','ISOTELHADO'];

  let orcFiltrados = mesFiltro === 'TODOS' ? ORCAMENTOS : ORCAMENTOS.filter(o => o.mes === mesFiltro);
  let projFiltrados = mesFiltro === 'TODOS' ? PROJETOS : PROJETOS.filter(p => p.mes === mesFiltro);
  if (repFiltro !== 'TODAS') {
    orcFiltrados = orcFiltrados.filter(o => o.reparticao === repFiltro);
    projFiltrados = projFiltrados.filter(p => p.reparticao === repFiltro);
  }
  const projetosDoMes = new Set(orcFiltrados.map(o => o.projeto).concat(projFiltrados.map(p => p.projeto)));
  const calcFiltrados = (mesFiltro === 'TODOS' && repFiltro === 'TODAS') ? CALCULOS : CALCULOS.filter(c => projetosDoMes.has(c.projeto));
  const artsFiltradas = (mesFiltro === 'TODOS' && repFiltro === 'TODAS') ? ARTS : ARTS.filter(a => projetosDoMes.has(a.projeto));

  const totalOrc = orcFiltrados.length;
  const valorOrc = orcFiltrados.reduce((a,o)=>a+o.valorTotal,0);
  const fechados = orcFiltrados.filter(o=>o.fechado==='SIM');
  const valorFechado = fechados.reduce((a,o)=>a+(o.rFechado||0),0);
  const taxa = totalOrc > 0 ? Math.round((fechados.length/totalOrc)*100) : 0;
  const statusOrc = orcFiltrados.reduce((a,o)=>{a[o.status]=(a[o.status]||0)+1;return a;},{});
  const statusProj = projFiltrados.reduce((a,p)=>{a[p.status]=(a[p.status]||0)+1;return a;},{});
  const CORES_ORC = { 'PENDENTE':'yellow','EM ANÁLISE':'blue','APROVADO':'purple','APROVAÇÃO CLIENTE':'indigo','FINALIZADO':'green','CANCELADO':'red','NÃO FECHADO':'slate' };
  const CORES_PROJ = { 'PENDENTE':'yellow','APROVAÇÃO CLIENTE':'blue','COMPATIBILIZAÇÃO':'purple','CADASTRO':'teal','CONTROLADORIA':'orange','IMPLANTAÇÃO':'blue','EM ANDAMENTO':'blue','FINALIZADO':'green','CANCELADO':'red' };

  const porMes = [
    {mes:'JAN', count:2, valor:640000},
    {mes:'FEV', count:3, valor:1978000},
    {mes:'MAR', count:3, valor:845400},
    {mes:'ABR', count:4, valor:2892000},
  ];
  const maxVal = Math.max(...porMes.map(x=>x.valor));

  return (
    <div className="p-6 space-y-6">
      <div className="flex items-start justify-between gap-4 flex-wrap">
        <div>
          <h1 className="text-2xl font-bold text-slate-900">Olá, Marcelo 👋</h1>
          <p className="text-slate-500 text-sm mt-1">
            {mesFiltro === 'TODOS' ? 'Visão geral — ano de 2026' : `Visão do mês · ${mesFiltro.toLowerCase()} de 2026`}
          </p>
        </div>
      </div>

      <VisaoGeralContent {...{mesFiltro,setMesFiltro,repFiltro,setRepFiltro,MESES_DISPONIVEIS,MES_ABREV,REPARTICOES,orcFiltrados,projFiltrados,calcFiltrados,artsFiltradas,totalOrc,valorOrc,fechados,valorFechado,taxa,statusOrc,statusProj,CORES_ORC,CORES_PROJ,porMes,maxVal}}/>
    </div>
  );
}

function VisaoGeralContent({mesFiltro,setMesFiltro,repFiltro,setRepFiltro,MESES_DISPONIVEIS,MES_ABREV,REPARTICOES,orcFiltrados,projFiltrados,calcFiltrados,artsFiltradas,totalOrc,valorOrc,fechados,valorFechado,taxa,statusOrc,statusProj,CORES_ORC,CORES_PROJ,porMes,maxVal}) {
  return (
    <div className="space-y-6">

      <div className="flex flex-wrap gap-1.5">
        {MESES_DISPONIVEIS.map(m => {
          const active = m === mesFiltro;
          const label = m === 'TODOS' ? 'Todos' : (MES_ABREV[m] || m.slice(0,3));
          return (
            <button key={m} onClick={()=>setMesFiltro(m)}
              className="px-3 py-1.5 rounded-full text-xs font-semibold transition-all"
              style={active
                ? {background:'var(--accent)',color:'#fff',boxShadow:'0 1px 3px rgba(31,122,149,.3)'}
                : {background:'var(--bg-surface)',color:'var(--text-muted)',border:'1px solid var(--border)'}}>
              {label}
            </button>
          );
        })}
      </div>

      <div className="flex flex-wrap items-center gap-2">
        <span className="text-[10px] font-semibold uppercase tracking-widest mr-1" style={{color:'var(--text-muted)'}}>Repartição</span>
        {REPARTICOES.map(r => {
          const active = r === repFiltro;
          const label = r === 'TODAS' ? 'Todas' : r;
          return (
            <button key={r} onClick={()=>setRepFiltro(r)}
              className="px-3 py-1.5 rounded-full text-xs font-semibold transition-all"
              style={active
                ? {background:'#1d4ed8',color:'#fff',boxShadow:'0 1px 3px rgba(29,78,216,.3)'}
                : {background:'var(--bg-surface)',color:'var(--text-muted)',border:'1px solid var(--border)'}}>
              {label}
            </button>
          );
        })}
      </div>

      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        <KpiCard label="Total Orçamentos" value={totalOrc} sub={fmtMoeda(valorOrc)} icon={IFile} cor="blue"/>
        <KpiCard label="Fechados" value={fechados.length} sub={`${taxa}% conversão`} icon={ICheck} cor="green"/>
        <KpiCard label="Projetos Ativos" value={projFiltrados.filter(p=>!['FINALIZADO','CANCELADO'].includes(p.status)).length} sub={`${projFiltrados.length} total`} icon={IFolder} cor="purple"/>
        <KpiCard label="R$ Fechado" value={fmtMoeda(valorFechado)} sub="Valor contratado" icon={ITrendUp} cor="teal"/>
      </div>

      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        <KpiCard label="Cálculos" value={calcFiltrados.length} icon={ICalc} cor="orange"/>
        <KpiCard label="ARTs" value={artsFiltradas.length} sub={`${artsFiltradas.filter(a=>a.fechado==='SIM').length} fechadas`} icon={IAward} cor="blue"/>
        <KpiCard label="Pendentes" value={orcFiltrados.filter(o=>o.status==='PENDENTE').length} icon={IClock} cor="orange"/>
        <KpiCard label="Cancelados" value={orcFiltrados.filter(o=>o.status==='CANCELADO').length} icon={IAlert} cor="red"/>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div className="card p-5">
          <h2 className="text-sm font-bold text-slate-700 mb-4">Status dos Orçamentos</h2>
          <div className="space-y-3">
            {Object.entries(statusOrc).sort((a,b)=>b[1]-a[1]).map(([s,c])=>(
              <BarraStatus key={s} label={s} count={c} total={totalOrc} cor={CORES_ORC[s]||'blue'}/>
            ))}
          </div>
        </div>
        <div className="card p-5">
          <h2 className="text-sm font-bold text-slate-700 mb-4">Status dos Projetos</h2>
          <div className="space-y-3">
            {Object.entries(statusProj).sort((a,b)=>b[1]-a[1]).map(([s,c])=>(
              <BarraStatus key={s} label={s} count={c} total={projFiltrados.length} cor={CORES_PROJ[s]||'blue'}/>
            ))}
          </div>
        </div>
      </div>

      <div className="card p-5">
        <h2 className="text-sm font-bold text-slate-700 mb-4">Orçamentos por Mês · 2026</h2>
        <div className="flex items-end gap-6 h-44">
          {porMes.map(m=>{
            const h = Math.max(Math.round((m.valor/maxVal)*140), 12);
            const mesFull = Object.keys(MES_ABREV).find(k => MES_ABREV[k] === m.mes);
            const selecionado = mesFiltro === mesFull;
            const dimmed = mesFiltro !== 'TODOS' && !selecionado;
            return (
              <button key={m.mes} onClick={()=>setMesFiltro(selecionado ? 'TODOS' : mesFull)}
                className="flex-1 flex flex-col items-center gap-1.5 cursor-pointer bg-transparent border-0 p-0"
                style={{opacity: dimmed ? 0.35 : 1, transition:'opacity .2s'}}
                title={`Filtrar por ${mesFull?.toLowerCase()}`}>
                <span className="text-[10px] text-slate-500 font-medium">{fmtMoeda(m.valor).replace('R$','').trim()}</span>

                  height:h,
                  background: selecionado

      <div className="grid grid-cols-1 md:grid-cols-2 gap-5">

              <div className="flex items-center justify-between mb-3">

              </div>
              <div className="grid grid-cols-2 gap-3 text-sm">
                <div><span className="text-slate-500 text-xs">Orçamentos</span><p className="font-bold text-slate-900 text-lg">{orcs.length}</p></div>
                <div><span className="text-slate-500 text-xs">Fechados</span><p className="font-bold text-green-700 text-lg">{orcs.filter(o=>o.fechado==='SIM').length}</p></div>
                <div><span className="text-slate-500 text-xs">Valor total</span><p className="font-bold text-slate-900">{fmtMoeda(orcs.reduce((a,o)=>a+o.valorTotal,0))}</p></div>

function OrcamentoEstimadoForm({ onClose }) {
  const [valores, setValores] = useState({ NEXFRAME:'', ISOTELHADO:'', ISODRY:'', DRYFAST:'' });
  const PRODUTOS = [
    { id:'NEXFRAME', label:'NEXFRAME', desc:'Estrutura em light steel frame', cor:'#1f7a95' },
    { id:'ISOTELHADO', label:'ISOTELHADO', desc:'Cobertura com painel isotérmico', cor:'#0d9488' },
    { id:'ISODRY', label:'ISODRY', desc:'Vedação drywall com isolamento', cor:'#9333ea' },
    { id:'DRYFAST', label:'DRYFAST', desc:'Sistema rápido de fechamento', cor:'#ea580c' },
  ];
  const set = (k,v) => setValores(prev => ({...prev, [k]: v}));
  const precoM2 = { NEXFRAME: 1250, ISOTELHADO: 680, ISODRY: 420, DRYFAST: 350 };
  const totais = Object.fromEntries(PRODUTOS.map(p => [p.id, (parseFloat(valores[p.id])||0) * precoM2[p.id]]));
  const totalGeral = Object.values(totais).reduce((a,b)=>a+b,0);

  return (
    <div className="card p-6">
      <div className="flex items-start justify-between mb-5">
        <div>
          <h3 className="text-lg font-bold text-slate-900">Orçamento estimado</h3>
          <p className="text-xs text-slate-500 mt-1">Informe a área (m²) para cada sistema</p>
        </div>
        <button onClick={onClose} className="p-1.5 rounded-lg text-slate-400 hover:bg-slate-100"><IX/></button>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        {PRODUTOS.map(p => (
          <div key={p.id} className="p-4 rounded-xl border" style={{borderColor:'var(--border)',background:'var(--bg-muted)'}}>
            <div className="flex items-center justify-between mb-2">
              <div>
                <p className="font-bold text-slate-900">{p.label}</p>
                <p className="text-[11px] text-slate-500">{p.desc}</p>
              </div>
              <span className="text-[10px] font-semibold px-2 py-0.5 rounded-full" style={{background:p.cor+'1a',color:p.cor}}>
                {fmtMoeda(precoM2[p.id])}/m²
              </span>
            </div>
            <div className="flex items-center gap-2 mt-3">
              <input type="number" min="0" step="any" value={valores[p.id]} onChange={e=>set(p.id, e.target.value)}
                placeholder="0" className="input" style={{fontSize:16,fontWeight:600}}/>
              <span className="text-sm font-semibold" style={{color:'var(--text-muted)'}}>m²</span>
            </div>
            <p className="text-xs mt-2 text-right font-semibold" style={{color:p.cor}}>
              Subtotal: {fmtMoeda(totais[p.id])}
            </p>
          </div>
        ))}
      </div>

      <div className="mt-5 pt-4 border-t flex items-center justify-between" style={{borderColor:'var(--border)'}}>
        <div>
          <p className="text-xs font-semibold uppercase tracking-wider" style={{color:'var(--text-muted)'}}>Total estimado</p>
          <p className="text-2xl font-bold text-slate-900 mt-0.5">{fmtMoeda(totalGeral)}</p>
        </div>
        <div className="flex gap-2">
          <button className="btn-secondary" onClick={()=>setValores({NEXFRAME:'',ISOTELHADO:'',ISODRY:'',DRYFAST:''})}>Limpar</button>
          <button className="btn-primary">Gerar orçamento</button>
        </div>
      </div>
    </div>
  );
}

/* ---------------- RELATÓRIOS PAGE ---------------- */
function Relatorios() {
  const [tipoRel, setTipoRel] = useState('orcamentos');
  const [filtroMes, setFiltroMes] = useState('');
  const [filtroStatus, setFiltroStatus] = useState('');
  const [filtroRep, setFiltroRep] = useState('');
  const [filtroResp, setFiltroResp] = useState('');
  const [filtroCliente, setFiltroCliente] = useState('');

  const dados = tipoRel === 'orcamentos' ? ORCAMENTOS : PROJETOS;
  const campos = tipoRel === 'orcamentos'
    ? ['fluig', 'mes', 'cliente', 'projeto', 'status', 'area', 'valorTotal', 'responsavel', 'reparticao', 'tipologia']
    : ['mf', 'fluig', 'mes', 'cliente', 'projeto', 'status', 'proposta', 'aprovCliente', 'implantacao', 'area', 'rTotal', 'responsavel', 'reparticao', 'tipologia'];

  const filtrado = dados.filter(d => {
    return (!filtroMes || d.mes === filtroMes)
      && (!filtroStatus || d.status === filtroStatus)
      && (!filtroRep || d.reparticao === filtroRep)
      && (!filtroResp || d.responsavel === filtroResp)
      && (!filtroCliente || d.cliente.toLowerCase().includes(filtroCliente.toLowerCase()));
  });

  const statusDist = filtrado.reduce((a,d) => {a[d.status] = (a[d.status]||0) + 1; return a;}, {});
  const totalValor = tipoRel === 'orcamentos' 
    ? filtrado.reduce((a,d) => a + (d.valorTotal||0), 0)
    : filtrado.reduce((a,d) => a + (d.rTotal||0), 0);
  const totalArea = filtrado.reduce((a,d) => a + (d.area||0), 0);

  const subPorRep = {};
  filtrado.forEach(d => {
    const rep = d.reparticao;
    if (!subPorRep[rep]) subPorRep[rep] = { count: 0, valor: 0 };
    subPorRep[rep].count++;
    subPorRep[rep].valor += tipoRel === 'orcamentos' ? (d.valorTotal||0) : (d.rTotal||0);
  });

  const exportarCSV = () => {
    const headers = ['FLUIG/MF', 'Mês', 'Cliente', 'Projeto', 'Status', 'Área', 'Valor', 'Responsável', 'Repartição', 'Tipologia'];
    const rows = filtrado.map(d => [
      tipoRel === 'orcamentos' ? d.fluig : d.mf,
      d.mes, d.cliente, d.projeto, d.status, d.area, 
      tipoRel === 'orcamentos' ? d.valorTotal : d.rTotal,
      d.responsavel, d.reparticao, d.tipologia
    ]);
    const csv = [headers, ...rows].map(r => r.map(c => `"${c}"`).join(',')).join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `relatorio-${tipoRel}-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  };

  const exportarJSON = () => {
    const data = { tipo: tipoRel, geradoEm: new Date().toISOString(), total: filtrado.length, dados: filtrado };
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `relatorio-${tipoRel}-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
  };

  const exportarExcel = () => {
    alert('✓ Exportar Excel — em desenvolvimento. Por enquanto, use CSV e importe no Excel, ou PDF para visualizar.');
  };

  const exportarPDF = () => {
    alert('✓ Exportar PDF — em desenvolvimento. Você consegue usar Cmd+P (Mac) ou Ctrl+P (Windows) nesta página para salvar como PDF.');
  };

  return (
    <div className="p-6 space-y-6">
      <PageHeader title="Relatórios" subtitle="Geração de relatórios com filtros e exportação"/>

      {/* Tipo de relatório */}
      <div className="card p-5">
        <p className="text-sm font-semibold mb-3">Tipo de relatório</p>
        <div className="flex gap-3">
          {[
            {val:'orcamentos', label:'Orçamentos'},
            {val:'projetos', label:'Projetos'},
          ].map(op => (
            <label key={op.val} className="flex items-center gap-2 cursor-pointer">
              <input type="radio" name="tipo" value={op.val} checked={tipoRel===op.val} onChange={e=>setTipoRel(e.target.value)} className="w-4 h-4"/>
              <span className="text-sm font-medium">{op.label}</span>
            </label>
          ))}
        </div>
      </div>

      {/* Filtros */}
      <div className="card p-5">
        <p className="text-sm font-semibold mb-3">Filtros</p>
        <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
          <div>
            <label className="label">Período</label>
            <select className="select text-sm" value={filtroMes} onChange={e=>setFiltroMes(e.target.value)}>
              <option value="">Todos</option>
              {MESES.map(m=><option key={m}>{m}</option>)}
            </select>
          </div>
          <div>
            <label className="label">Status</label>
            <select className="select text-sm" value={filtroStatus} onChange={e=>setFiltroStatus(e.target.value)}>
              <option value="">Todos</option>
              {(tipoRel === 'orcamentos' 
                ? ['PENDENTE','EM ANÁLISE','APROVAÇÃO CLIENTE','APROVADO','FINALIZADO','CANCELADO','NÃO FECHADO']
                : ['PENDENTE','APROVAÇÃO CLIENTE','COMPATIBILIZAÇÃO','CADASTRO','CONTROLADORIA','IMPLANTAÇÃO','EM ANDAMENTO','FINALIZADO','CANCELADO']
              ).map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div>
            <label className="label">Repartição</label>
            <select className="select text-sm" value={filtroRep} onChange={e=>setFiltroRep(e.target.value)}>
              <option value="">Todas</option>
              {['NEXFRAME','ISOTELHADO','ISM'].map(r=><option key={r}>{r}</option>)}
            </select>
          </div>
          <div>
            <label className="label">Responsável</label>
            <input type="text" className="input text-sm" value={filtroResp} onChange={e=>setFiltroResp(e.target.value)} placeholder="Nome"/>
          </div>
          <div>
            <label className="label">Cliente</label>
            <input type="text" className="input text-sm" value={filtroCliente} onChange={e=>setFiltroCliente(e.target.value)} placeholder="Nome"/>
          </div>
        </div>
        {(filtroMes||filtroStatus||filtroRep||filtroResp||filtroCliente) && (
          <button className="btn-ghost text-xs mt-3" onClick={()=>{setFiltroMes('');setFiltroStatus('');setFiltroRep('');setFiltroResp('');setFiltroCliente('');}}>Limpar filtros</button>
        )}
      </div>

      {/* Resumo */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div className="card p-4">
          <p className="text-xs text-slate-500 uppercase font-semibold">Total de registros</p>
          <p className="text-3xl font-bold mt-1">{filtrado.length}</p>
        </div>
        <div className="card p-4">
          <p className="text-xs text-slate-500 uppercase font-semibold">Área total (m²)</p>
          <p className="text-3xl font-bold mt-1">{totalArea.toLocaleString('pt-BR')}</p>
        </div>
        <div className="card p-4">
          <p className="text-xs text-slate-500 uppercase font-semibold">Valor total</p>
          <p className="text-xl font-bold text-green-700 mt-1">{fmtMoeda(totalValor)}</p>
        </div>
        <div className="card p-4">
          <p className="text-xs text-slate-500 uppercase font-semibold">Média por registro</p>
          <p className="text-xl font-bold mt-1">{fmtMoeda(filtrado.length > 0 ? totalValor / filtrado.length : 0)}</p>
        </div>
      </div>

      {/* Distribuição por status */}
      <div className="card p-5">
        <p className="text-sm font-semibold mb-4">Distribuição por status</p>
        <div className="space-y-2">
          {Object.entries(statusDist).sort((a,b)=>b[1]-a[1]).map(([s,c])=>(
            <div key={s} className="flex items-center gap-3">
              <span className="w-32 text-xs text-slate-600">{s}</span>
              <div className="flex-1 bg-slate-200 rounded-full h-2">
                <div style={{width:`${(c/filtrado.length)*100}%`,background:'#1f7a95',height:'100%',borderRadius:9999}}/>
              </div>
              <span className="w-12 text-right text-xs font-semibold">{c}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Subtotais por repartição */}
      <div className="card p-5">
        <p className="text-sm font-semibold mb-4">Subtotais por repartição</p>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
          {Object.entries(subPorRep).map(([rep, {count, valor}])=>(
            <div key={rep} className="p-3 border rounded-lg" style={{borderColor:'var(--border)'}}>
              <p className="text-xs font-semibold uppercase" style={{color:'var(--text-muted)'}}>{rep}</p>
              <p className="text-lg font-bold mt-1">{count} {tipoRel === 'orcamentos' ? 'orç.' : 'proj.'}</p>
              <p className="text-sm font-semibold text-green-700">{fmtMoeda(valor)}</p>
            </div>
          ))}
        </div>
      </div>

      {/* Tabela de dados */}
      <div className="card overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-xs">
            <thead>
              <tr className="bg-slate-50 border-b" style={{borderColor:'var(--border)'}}>
                {[
                  tipoRel === 'orcamentos' ? 'FLUIG' : 'MF',
                  'Mês', 'Cliente', 'Projeto', 'Status', 'Área (m²)',
                  tipoRel === 'orcamentos' ? 'Valor' : 'R$ Total',
                  'Responsável', 'Repartição', 'Tipologia'
                ].map(h=>(
                  <th key={h} className="text-left px-4 py-2 font-semibold" style={{color:'var(--text-muted)'}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody className="divide-y" style={{borderColor:'var(--border)'}}>
              {filtrado.slice(0,50).map((d,i)=>(
                <tr key={i} style={{borderColor:'var(--border)'}}>
                  <td className="px-4 py-2 font-mono">{tipoRel === 'orcamentos' ? d.fluig : d.mf}</td>
                  <td className="px-4 py-2">{d.mes}</td>
                  <td className="px-4 py-2">{d.cliente}</td>
                  <td className="px-4 py-2 max-w-[200px] truncate">{d.projeto}</td>
                  <td className="px-4 py-2"><StatusBadge status={d.status}/></td>
                  <td className="px-4 py-2">{d.area.toLocaleString('pt-BR')}</td>
                  <td className="px-4 py-2 font-semibold">{fmtMoeda(tipoRel === 'orcamentos' ? d.valorTotal : d.rTotal)}</td>
                  <td className="px-4 py-2">{d.responsavel}</td>
                  <td className="px-4 py-2">{d.reparticao}</td>
                  <td className="px-4 py-2">{d.tipologia}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="px-4 py-2 bg-slate-50 border-t text-xs" style={{borderColor:'var(--border)'}}>
          {filtrado.length > 50 && <span>Exibindo 50 de {filtrado.length} registros</span>}
        </div>
      </div>

      {/* Exportação */}
      <div className="card p-5">
        <p className="text-sm font-semibold mb-3">Exportar relatório</p>
        <div className="flex flex-wrap gap-2">
          <button className="btn-secondary flex items-center gap-2" onClick={exportarCSV}>
            📄 Exportar CSV
          </button>
          <button className="btn-secondary flex items-center gap-2" onClick={exportarJSON}>
            📊 Exportar JSON
          </button>
          <button className="btn-secondary flex items-center gap-2" onClick={exportarExcel}>
            📈 Exportar Excel
          </button>
          <button className="btn-secondary flex items-center gap-2" onClick={exportarPDF}>
            🖨️ Exportar PDF
          </button>
          <button className="btn-ghost flex items-center gap-2" onClick={()=>window.print()}>
            🖨️ Imprimir
          </button>
        </div>
      </div>
    </div>
  );

            {USUARIOS.map(u=>{
              const ini = u.nome.split(' ').slice(0,2).map(n=>n[0]).join('');
              const perfilCor = { gestor:'#faf5ff;#6b21a8', comercial:'#eff6ff;#1d4ed8', tecnico:'#f0fdf4;#166534', controladoria:'#fff7ed;#9a3412' }[u.perfil].split(';');
              return (
                <tr key={u.id} className="hover:bg-slate-50">
                  <td className="px-4 py-3">
                    <div className="flex items-center gap-3">
                      <div className="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold text-white" style={{background:'#1d4ed8'}}>{ini}</div>
                      <span className="font-medium text-slate-900">{u.nome}</span>
                    </div>
                  </td>
                  <td className="px-4 py-3 text-slate-600">{u.email}</td>
                  <td className="px-4 py-3">
                    <span className="inline-flex items-center px-2.5 py-1 rounded-full text-[11px] font-semibold capitalize" style={{background:perfilCor[0],color:perfilCor[1]}}>{u.perfil}</span>
                  </td>
                  <td className="px-4 py-3">
                    <span className={`inline-flex items-center gap-1.5 text-xs font-semibold ${u.ativo?'text-green-700':'text-slate-400'}`}>
                      <span className={`w-1.5 h-1.5 rounded-full ${u.ativo?'bg-green-500':'bg-slate-300'}`}/> {u.ativo?'Ativo':'Inativo'}
                    </span>
                  </td>
                  <td className="px-4 py-3 text-right">
                    <button className="p-1.5 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg"><IPencil/></button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ---------------- APP ---------------- */
function App() {
  const [logged, setLogged] = useState(() => localStorage.getItem('isocs_logged') === '1');
  const [route, setRoute] = useState(() => localStorage.getItem('isocs_route') || 'dashboard');
  const [theme, setTheme] = useState(() => localStorage.getItem('isocs_theme') || 'light');

  useEffect(() => { localStorage.setItem('isocs_logged', logged ? '1' : '0'); }, [logged]);
  useEffect(() => { localStorage.setItem('isocs_route', route); }, [route]);
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('isocs_theme', theme);
  }, [theme]);

  const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');

  if (!logged) return <Login onLogin={() => setLogged(true)} />;

  const titulos = { dashboard:'Dashboard', orcamentos:'Orçamentos', projetos:'Projetos', ferramentas:'Ferramentas', relatorios:'Relatórios', isotrack:'Isotrack', art:'ART', admin:'Usuários' };

  return (
    <div className="flex h-screen overflow-hidden">
      <Sidebar route={route} setRoute={setRoute} onLogout={() => setLogged(false)}/>
      <div className="flex-1 flex flex-col min-w-0 overflow-hidden">
        <Topbar titulo={titulos[route]} theme={theme} onToggleTheme={toggleTheme}/>
        <main className="flex-1 overflow-y-auto">
          {route === 'dashboard' && <Dashboard/>}
          {route === 'orcamentos' && <Orcamentos/>}
          {route === 'projetos' && <Projetos/>}
          {route === 'calculos' && <Calculos/>}
          {route === 'ferramentas' && <Ferramentas/>}
          {route === 'relatorios' && <Relatorios/>}
          {route === 'isotrack' && <Isotrack/>}
          {route === 'arquitetura' && <Arquitetura/>}
          {route === 'art' && <ART/>}
          {route === 'admin' && <Admin/>}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
